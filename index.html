<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle Roku</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
margin:0;
padding:10px;
}

.titulo{
color:#6f2dbd;
font-size:32px;
}

input{
padding:10px;
border-radius:8px;
border:none;
width:90%;
max-width:320px;
font-size:16px;
margin-bottom:20px;
}

/* controle */

.controle{
position:relative;
width:300px;
margin:auto;
}

.controle img{
width:100%;
display:block;
}

/* botões invisíveis */

.btn{
position:absolute;
opacity:0;
cursor:pointer;
transform: translateY(-5px);
}

/* DIRECIONAL */

.up{
top:165px;
left:50%;
transform:translate(-50%,-5px);
width:70px;
height:60px;
}

.down{
top:280px;
left:50%;
transform:translate(-50%,-5px);
width:70px;
height:60px;
}

.left{
top:225px;
left:60px;
width:70px;
height:70px;
}

.right{
top:225px;
right:60px;
width:70px;
height:70px;
}

.ok{
top:225px;
left:50%;
transform:translate(-50%,-5px);
width:90px;
height:90px;
border-radius:50%;
}

/* superiores */

.home{
top:85px;
left:45px;
width:90px;
height:45px;
}

.back{
top:85px;
right:45px;
width:90px;
height:45px;
}

/* mídia */

.rev{
top:390px;
left:45px;
width:80px;
height:45px;
}

.play{
top:390px;
left:50%;
transform:translate(-50%,-5px);
width:90px;
height:45px;
}

.fwd{
top:390px;
right:45px;
width:80px;
height:45px;
}

/* volume */

.volup{
top:470px;
left:40px;
width:80px;
height:40px;
}

.voldown{
top:515px;
left:40px;
width:80px;
height:40px;
}

.mute{
top:560px;
left:40px;
width:80px;
height:40px;
}

</style>
</head>

<body>

<h1 class="titulo">Controle Roku</h1>

<input type="text" id="ip" placeholder="Digite o IP do Roku">

<div class="controle">

<img src="controle.png">

<button class="btn home" onclick="enviar('Home')"></button>
<button class="btn back" onclick="enviar('Back')"></button>

<button class="btn up" onclick="enviar('Up')"></button>
<button class="btn left" onclick="enviar('Left')"></button>
<button class="btn ok" onclick="enviar('Select')"></button>
<button class="btn right" onclick="enviar('Right')"></button>
<button class="btn down" onclick="enviar('Down')"></button>

<button class="btn rev" onclick="enviar('Rev')"></button>
<button class="btn play" onclick="enviar('Play')"></button>
<button class="btn fwd" onclick="enviar('Fwd')"></button>

<button class="btn volup" onclick="enviar('VolumeUp')"></button>
<button class="btn voldown" onclick="enviar('VolumeDown')"></button>
<button class="btn mute" onclick="enviar('VolumeMute')"></button>

</div>

<script>

function enviar(comando){

const ip=document.getElementById("ip").value.trim()

if(!ip){
alert("Digite o IP do Roku")
return
}

fetch(`http://${ip}:8060/keypress/${comando}`,{
method:"POST"
})
.catch(err=>console.log(err))

}

</script>

</body>
</html>
