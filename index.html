<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle Roku</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
margin:0;
padding:10px;
}

.titulo{
color:#6f2dbd;
font-size:32px;
}

/* campo IP */
input{
padding:10px;
border-radius:8px;
border:none;
width:90%;
max-width:300px;
font-size:16px;
margin-bottom:20px;
}

/* container do controle */
.controle{
position:relative;
width:280px;
margin:auto;
}

.img-controle{
width:100%;
}

/* botões posicionados */
.botoes button{
position:absolute;
background:#6f2dbd;
color:white;
border:none;
border-radius:50%;
cursor:pointer;
}

.botoes button:hover{
background:#5a23a0;
}

/* DIRECIONAL */

.up{
top:110px;
left:50%;
transform:translateX(-50%);
width:60px;
height:60px;
}

.down{
top:220px;
left:50%;
transform:translateX(-50%);
width:60px;
height:60px;
}

.left{
top:165px;
left:40px;
width:60px;
height:60px;
}

.right{
top:165px;
right:40px;
width:60px;
height:60px;
}

.ok{
top:165px;
left:50%;
transform:translateX(-50%);
width:70px;
height:70px;
}

/* botões superiores */

.home{
top:40px;
left:30px;
width:60px;
height:40px;
border-radius:12px;
}

.back{
top:40px;
right:30px;
width:60px;
height:40px;
border-radius:12px;
}

/* mídia */

.play{
top:300px;
left:50%;
transform:translateX(-50%);
width:70px;
height:40px;
border-radius:12px;
}

.rev{
top:300px;
left:30px;
width:60px;
height:40px;
border-radius:12px;
}

.fwd{
top:300px;
right:30px;
width:60px;
height:40px;
border-radius:12px;
}

/* volume */

.volup{
top:360px;
left:30px;
width:70px;
height:40px;
border-radius:12px;
}

.voldown{
top:410px;
left:30px;
width:70px;
height:40px;
border-radius:12px;
}

.mute{
top:460px;
left:30px;
width:70px;
height:40px;
border-radius:12px;
}

</style>
</head>

<body>

<h1 class="titulo">Controle Roku</h1>

<input type="text" id="ip" placeholder="Digite o IP do Roku">

<div class="controle">

<img src="controle.png" class="img-controle">

<div class="botoes">

<button class="home" onclick="enviar('Home')">Home</button>
<button class="back" onclick="enviar('Back')">Back</button>

<button class="up" onclick="enviar('Up')">↑</button>
<button class="left" onclick="enviar('Left')">←</button>
<button class="ok" onclick="enviar('Select')">OK</button>
<button class="right" onclick="enviar('Right')">→</button>
<button class="down" onclick="enviar('Down')">↓</button>

<button class="rev" onclick="enviar('Rev')">⏪</button>
<button class="play" onclick="enviar('Play')">⏯</button>
<button class="fwd" onclick="enviar('Fwd')">⏩</button>

<button class="volup" onclick="enviar('VolumeUp')">Vol+</button>
<button class="voldown" onclick="enviar('VolumeDown')">Vol-</button>
<button class="mute" onclick="enviar('VolumeMute')">Mute</button>

</div>
</div>

<script>

function enviar(comando){

const ip=document.getElementById("ip").value.trim()

if(!ip){
alert("Digite o IP do Roku")
return
}

fetch(`http://${ip}:8060/keypress/${comando}`,{
method:"POST"
})
.catch(err=>console.log(err))

}

</script>

</body>
</html>
