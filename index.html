<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle Roku</title>

<style>

body{
background:#000;
font-family:Arial;
text-align:center;
color:white;
margin:0;
padding:10px;
}

h1{
color:#7b2be2;
}

input{
width:90%;
max-width:320px;
padding:12px;
border-radius:10px;
border:none;
font-size:16px;
margin-bottom:20px;
}

/* CONTROLE */
.controle{
position:relative;
width:300px;
margin:auto;
}

.controle img{
width:100%;
display:block;
}

/* BOTÕES INVISÍVEIS */
.btn{
position:absolute;
opacity:0.4; /* mude para 0 quando estiver perfeito */
background:red;
cursor:pointer;
}

/* POWER */
.power{
top:3.5%;
left:50%;
transform:translateX(-50%);
width:19%;
height:8%;
border-radius:50%;
}

/* BACK e HOME */
.back{
top:14%;
left:5%;
width:35%;
height:9%;
}

.home{
top:14%;
right:5%;
width:35%;
height:9%;
}

/* D-PAD */
.up{
top:27%;
left:37.5%;
width:25%;
height:9%;
}

.down{
top:49%;
left:37.5%;
width:25%;
height:9%;
}

.left{
top:34%;
left:12%;
width:26%;
height:16%;
}

.right{
top:34%;
right:12%;
width:26%;
height:16%;
}

.ok{
top:36%;
left:50%;
transform:translateX(-50%);
width:28%;
height:14%;
border-radius:50%;
}

/* PLAYBACK (Rev / Play / Fwd) - linha central baixa */
.rev{
top:60%;
left:6%;
width:28%;
height:8.5%;
}

.play{
top:60%;
left:36%;
width:28%;
height:8.5%;
}

.fwd{
top:60%;
right:6%;
width:28%;
height:8.5%;
}

/* VOLUME - coluna esquerda inferior, espaçada */
.volup{
top:70%;
left:6%;
width:28%;
height:8%;
}

.voldown{
top:78.5%;
left:6%;
width:28%;
height:8%;
}

.mute{
top:87%;
left:6%;
width:28%;
height:8%;
}

</style>
</head>

<body>

<h1>Controle Roku</h1>

<input id="ip" placeholder="Digite o IP do Roku">

<div class="controle">

<img src="controle.png">

<button class="btn power" onclick="enviar('Power')"></button>

<button class="btn home" onclick="enviar('Home')"></button>
<button class="btn back" onclick="enviar('Back')"></button>

<button class="btn up" onclick="enviar('Up')"></button>
<button class="btn down" onclick="enviar('Down')"></button>
<button class="btn left" onclick="enviar('Left')"></button>
<button class="btn right" onclick="enviar('Right')"></button>
<button class="btn ok" onclick="enviar('Select')"></button>

<button class="btn rev" onclick="enviar('Rev')"></button>
<button class="btn play" onclick="enviar('Play')"></button>
<button class="btn fwd" onclick="enviar('Fwd')"></button>

<button class="btn volup" onclick="enviar('VolumeUp')"></button>
<button class="btn voldown" onclick="enviar('VolumeDown')"></button>
<button class="btn mute" onclick="enviar('VolumeMute')"></button>

</div>

<script>

function enviar(comando){

const ip = document.getElementById("ip").value.trim()

if(!ip){
alert("Digite o IP do Roku")
return
}

fetch(`http://\( {ip}:8060/keypress/ \){comando}`,{
method:"POST"
})

}

</script>

</body>
</html>
