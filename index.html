/* CONTROLE */
.controle{
position:relative;
width:300px;
margin:auto;
}

.controle img{
width:100%;
display:block;
}

/* BOTÕES INVISÍVEIS */
.btn{
position:absolute;
opacity:0.4; /* mude para 0 quando estiver perfeito */
background:red;
cursor:pointer;
}

/* POWER */
.power{
top:3.5%;
left:50%;
transform:translateX(-50%);
width:19%;
height:8%;
border-radius:50%;
}

/* BACK e HOME */
.back{
top:14%;

height:9%;
}

.home{
top:14%;

height:9%;
}
