<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle Roku</title>

<style>

body{
background:#000;
font-family:Arial;
text-align:center;
color:white;
margin:0;
padding:10px;
}

h1{
color:#7b2be2;
}

input{
width:90%;
max-width:320px;
padding:12px;
border-radius:10px;
border:none;
font-size:16px;
margin-bottom:20px;
}

/* CONTROLE */

.controle{
position:relative;
width:300px;
margin:auto;
}

.controle img{
width:100%;
display:block;
}

/* BOTÕES INVISÍVEIS */
.btn{
position:absolute;
opacity:0.4; /* deixe visível enquanto ajusta */
background:red;
cursor:pointer;
}

/* POWER */

.power{
top:4%;
left:50%;
transform:translateX(-50%);
width:18%;
height:8%;
border-radius:50%;
}

/* BACK */

.back{
top:16%;
left:7%;
width:35%;
height:8%;
}

/* HOME */

.home{
top:16%;
right:7%;
width:35%;
height:8%;
}

/* DIRECIONAL */

.up{
top:30%;
left:38%;
width:24%;
height:8%;
}

.left{
top:38%;
left:20%;
width:25%;
height:10%;
}

.right{
top:38%;
right:20%;
width:25%;
height:10%;
}

.down{
top:48%;
left:38%;
width:24%;
height:10%;
}

.ok{
top:36%;
left:50%;
transform:translateX(-50%);
width:28%;
height:14%;
border-radius:50%;
}

/* MIDIA */

.rev{
top:64%;
left:8%;
width:28%;
height:8%;
}

.play{
top:64%;
left:36%;
width:28%;
height:8%;
}

.fwd{
top:64%;
right:8%;
width:28%;
height:8%;
}

/* VOLUME */

.volup{
top:75%;
left:8%;
width:28%;
height:7%;
}

.voldown{
top:82%;
left:8%;
width:28%;
height:7%;
}

.mute{
top:89%;
left:8%;
width:28%;
height:7%;
}

</style>
</head>

<body>

<h1>Controle Roku</h1>

<input id="ip" placeholder="Digite o IP do Roku">

<div class="controle">

<img src="controle.png">

<button class="btn power" onclick="enviar('Power')"></button>

<button class="btn home" onclick="enviar('Home')"></button>
<button class="btn back" onclick="enviar('Back')"></button>

<button class="btn up" onclick="enviar('Up')"></button>
<button class="btn down" onclick="enviar('Down')"></button>
<button class="btn left" onclick="enviar('Left')"></button>
<button class="btn right" onclick="enviar('Right')"></button>
<button class="btn ok" onclick="enviar('Select')"></button>

<button class="btn rev" onclick="enviar('Rev')"></button>
<button class="btn play" onclick="enviar('Play')"></button>
<button class="btn fwd" onclick="enviar('Fwd')"></button>

<button class="btn volup" onclick="enviar('VolumeUp')"></button>
<button class="btn voldown" onclick="enviar('VolumeDown')"></button>
<button class="btn mute" onclick="enviar('VolumeMute')"></button>

</div>

<script>

function enviar(comando){

const ip = document.getElementById("ip").value.trim()

if(!ip){
alert("Digite o IP do Roku")
return
}

fetch(`http://${ip}:8060/keypress/${comando}`,{
method:"POST"
})

}

</script>

</body>
</html>
