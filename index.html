<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle Roku</title>

<style>

body{
background:#000;
font-family:Arial;
text-align:center;
color:white;
margin:0;
padding:10px;
}

h1{
color:#7b2be2;
}

input{
width:90%;
max-width:320px;
padding:12px;
border-radius:10px;
border:none;
font-size:16px;
margin-bottom:20px;
}

/* CONTROLE */

.controle{
position:relative;
width:300px;
margin:auto;
}

.controle img{
width:100%;
display:block;
}

/* BOTÕES INVISÍVEIS */

.btn{
position:absolute;
opacity:0.4;
background:red;
cursor:pointer;
}

/* POWER */

.power{
top:20px;
left:50%;
transform:translateX(-50%);
width:70px;
height:70px;
border-radius:50%;
}

/* HOME E BACK */

.home{
top:100px;
right:30px;
width:90px;
height:45px;
}

.back{
top:100px;
left:30px;
width:90px;
height:45px;
}

/* DIRECIONAL */

.up{
top:170px;
left:110px;
width:80px;
height:60px;
}

.down{
top:260px;
left:110px;
width:80px;
height:60px;
}

.left{
top:220px;
left:40px;
width:80px;
height:60px;
}

.right{
top:220px;
right:40px;
width:80px;
height:60px;
}

.ok{
top:210px;
left:50%;
transform:translateX(-50%);
width:90px;
height:90px;
border-radius:50%;
}

/* MEDIA */

.rev{
top:350px;
left:30px;
width:80px;
height:50px;
}

.play{
top:350px;
left:50%;
transform:translateX(-50%);
width:80px;
height:50px;
}

.fwd{
top:350px;
right:30px;
width:80px;
height:50px;
}

/* VOLUME */

.volup{
top:420px;
left:30px;
width:80px;
height:45px;
}

.voldown{
top:470px;
left:30px;
width:80px;
height:45px;
}

.mute{
top:520px;
left:30px;
width:80px;
height:45px;
}

</style>
</head>

<body>

<h1>Controle Roku</h1>

<input id="ip" placeholder="Digite o IP do Roku">

<div class="controle">

<img src="controle.png">

<button class="btn power" onclick="enviar('Power')"></button>

<button class="btn home" onclick="enviar('Home')"></button>
<button class="btn back" onclick="enviar('Back')"></button>

<button class="btn up" onclick="enviar('Up')"></button>
<button class="btn down" onclick="enviar('Down')"></button>
<button class="btn left" onclick="enviar('Left')"></button>
<button class="btn right" onclick="enviar('Right')"></button>
<button class="btn ok" onclick="enviar('Select')"></button>

<button class="btn rev" onclick="enviar('Rev')"></button>
<button class="btn play" onclick="enviar('Play')"></button>
<button class="btn fwd" onclick="enviar('Fwd')"></button>

<button class="btn volup" onclick="enviar('VolumeUp')"></button>
<button class="btn voldown" onclick="enviar('VolumeDown')"></button>
<button class="btn mute" onclick="enviar('VolumeMute')"></button>

</div>

<script>

function enviar(comando){

const ip = document.getElementById("ip").value.trim()

if(!ip){
alert("Digite o IP do Roku")
return
}

fetch(`http://${ip}:8060/keypress/${comando}`,{
method:"POST"
})

}

</script>

</body>
</html>
